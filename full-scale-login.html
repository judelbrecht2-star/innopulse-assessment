<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>InnoPulse Full-Scale — Sign In</title>
<link rel="icon" href="/logo.png">
<style>
  :root{--bg:#f1f1ea;--ink:#16180f;--muted:#5c6150;--card:#fff;--lime:#7aa80f;--lime2:#c4ff4d;--charcoal:#16180f}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:var(--card);border-radius:20px;box-shadow:0 12px 40px rgba(0,0,0,.08);max-width:420px;width:100%;padding:40px 34px}
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .brand img{width:34px;height:34px;border-radius:7px}
  .brand b{font-size:18px;font-weight:800}
  .brand b span{color:var(--lime)}
  h1{font-size:22px;margin:18px 0 6px}
  p.sub{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 24px}
  label{display:block;font-size:13px;font-weight:600;margin:0 0 6px}
  input[type=email]{width:100%;padding:13px 14px;border:1px solid #d9dccf;border-radius:11px;font-size:15px;outline:none;transition:border .15s}
  input[type=email]:focus{border-color:var(--lime)}
  button{width:100%;margin-top:18px;padding:14px;border:0;border-radius:999px;background:var(--charcoal);color:var(--lime2);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s}
  button:hover{opacity:.92}
  button:disabled{opacity:.5;cursor:not-allowed}
  .msg{margin-top:18px;padding:13px 15px;border-radius:11px;font-size:13.5px;line-height:1.45;display:none}
  .msg.ok{display:block;background:rgba(122,168,15,.12);border:1px solid rgba(122,168,15,.4);color:#3f5208}
  .msg.err{display:block;background:rgba(200,40,40,.08);border:1px solid rgba(200,40,40,.35);color:#a12121}
  .foot{margin-top:26px;font-size:12px;color:var(--muted);text-align:center}
  .foot a{color:var(--muted)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/logo.png" alt="">
      <b>Inno<span>Pulse</span> Full-Scale</b>
    </div>
    <h1>Sign in to your dashboard</h1>
    <p class="sub">Enter your email and we'll send you a secure sign-in link. No password needed.</p>

    <form id="loginForm" autocomplete="on">
      <label for="email">Work email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email">
      <button type="submit" id="submitBtn">Send sign-in link</button>
    </form>

    <div class="msg" id="msg"></div>

    <div class="foot">
      Trouble signing in? Contact The Growth System.
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/full-scale-config.js"></script>
  <script>
  (function(){
    var cfg = (window.INNOPULSE_CONFIG || {});
    var SUPABASE_URL = cfg.SUPABASE_URL;
    var SUPABASE_KEY = cfg.SUPABASE_PUBLISHABLE_KEY;
    var msg = document.getElementById('msg');
    var btn = document.getElementById('submitBtn');

    function show(type, text){ msg.className = 'msg ' + type; msg.textContent = text; }

    if(!SUPABASE_URL || !SUPABASE_KEY || /YOUR_/.test(SUPABASE_KEY)){
      show('err', 'Configuration not set yet. Add your Supabase URL and publishable key to full-scale-config.js.');
      btn.disabled = true;
      return;
    }

    var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already signed in, go straight to dashboard
    supabase.auth.getSession().then(function(r){
      if(r && r.data && r.data.session){ window.location.replace('/full-scale-dashboard.html'); }
    });

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if(!email) return;
      btn.disabled = true; btn.textContent = 'Sending…';
      supabase.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: window.location.origin + '/full-scale-dashboard.html' }
      }).then(function(res){
        if(res.error){
          show('err', res.error.message || 'Could not send link. Please try again.');
          btn.disabled = false; btn.textContent = 'Send sign-in link';
        } else {
          show('ok', 'Check your inbox — we sent a sign-in link to ' + email + '. Click it on this device to continue.');
          btn.textContent = 'Link sent';
        }
      });
    });
  })();
  </script>
</body>
</html>
