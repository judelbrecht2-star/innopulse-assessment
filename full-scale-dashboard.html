s:11px;padding:11px 18px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:7px;font-size:14px}.btn-primary{background:var(--lime);color:var(--navy)}.btn-primary:hover{background:var(--lime-glow)}.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}.btn-dark{background:var(--navy);color:var(--lime)}.btn[disabled]{opacity:.45;cursor:not-allowed}.field{margin:12px 0}.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font:inherit;background:var(--white)}.inline{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{border:1px solid var(--line);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;cursor:pointer;background:var(--cream);user-select:none}.chip[aria-pressed=true]{background:var(--navy);color:#fff;border-color:var(--navy)}table{width:100%;border-collapse:collapse;font-size:13px}th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}th{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}.bar{height:9px;background:var(--cream2);border-radius:999px;overflow:hidden;min-width:60px}.bar>i{display:block;height:100%}.heat td.cell{text-align:center;font-weight:700;color:#16160f;border:2px solid var(--white)}.linkbox{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;background:var(--cream);border:1px solid var(--line);border-radius:8px;padding:8px 10px;word-break:break-all}.row{display:flex;gap:12px;align-items:center}.spread{justify-content:space-between}.tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.05em}.tag.green{background:rgba(95,138,0,.14);color:var(--green)}.tag.amber{background:rgba(224,167,46,.16);color:#9c6f10}.tag.red{background:rgba(214,72,60,.13);color:var(--red)}.hidden{display:none!important}.legend{display:flex;gap:14px;font-size:12px;color:var(--muted);flex-wrap:wrap;margin-top:10px}.legend span{display:inline-flex;align-items:center;gap:6px}.legend i{width:14px;height:14px;border-radius:3px;display:inline-block}.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:20px;flex-wrap:wrap}.tabs button{appearance:none;background:none;border:none;font:inherit;font-weight:700;font-size:14px;padding:10px 14px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px}.tabs button[aria-selected=true]{color:var(--ink);border-bottom-color:var(--lime)}@media(max-width:900px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr}}</style>

<!-- AUTH GATE LOGIC (Phase 2 — Supabase). Reversible: remove this block + the head block to restore public access. -->
<script>
(function authGate(){
  document.documentElement.classList.add('auth-checking');
  function reveal(){ document.documentElement.classList.remove('auth-checking'); }
  function go(url){ window.location.replace(url); }
  var cfg = window.INNOPULSE_CONFIG || {};
  var URL = cfg.SUPABASE_URL, KEY = cfg.SUPABASE_PUBLISHABLE_KEY;
  if(!URL || !KEY || /PASTE_YOUR/.test(KEY) || !window.supabase){
    // Misconfigured: fail safe to login page rather than expose dashboard.
    go('full-scale-login.html'); return;
  }
  var sb = window.supabase.createClient(URL, KEY);
  window.__sbClient = sb;
  sb.auth.getSession().then(function(res){
    var session = res && res.data && res.data.session;
    if(!session){ go('full-scale-login.html'); return; }
    reveal();
    wireSignOut(sb, session);
  }).catch(function(){ go('full-scale-login.html'); });

  function wireSignOut(sb, session){
    try{
      var bar = document.querySelector('.topbar');
      if(bar && !document.getElementById('signOutBtn')){
        var wrap = document.createElement('div');
        wrap.style.cssText='margin-left:auto;display:flex;align-items:center;gap:10px;font:inherit';
        var who = document.createElement('span');
        who.className='muted';
        who.style.cssText='font-size:13px';
        who.textContent = (session.user && session.user.email) ? session.user.email : '';
        var btn = document.createElement('button');
        btn.id='signOutBtn';
        btn.type='button';
        btn.textContent='Sign out';
        btn.style.cssText='cursor:pointer;border:1px solid var(--line,#ccc);background:var(--white,#fff);border-radius:8px;padding:6px 12px;font:inherit';
        btn.addEventListener('click', function(){
          sb.auth.signOut().then(function(){ window.location.replace('full-scale-login.html'); });
        });
        wrap.appendChild(who); wrap.appendChild(btn);
        bar.appendChild(wrap);
      }
    }catch(e){}
  }
})();
</script>
<script>
/* InnoPulse Full-Scale — admin dashboard.
   Reads corporate responses (from the Apps Script web app, or local pending data),
   aggregates by stakeholder group and pillar, and renders the executive summary,
   stakeholder comparison, pillar heatmap, response tracker, campaign manager and
   CSV export. Shares the five-pillar model from pillars.js. */

const PILLARS = window.INNOPULSE_PILLARS || [];
const STAKEHOLDERS = window.INNOPULSE_STAKEHOLDERS || {};
const DEFAULT_WEIGHTS = window.INNOPULSE_STAKEHOLDER_WEIGHTS || {executive:.25,employee:.35,customer:.25,partner:.15};
const CONFIG = window.INNOPULSE_CONFIG || {};
const ENDPOINT = CONFIG.endpoint || "";
const ASSESS_PATH = "full-scale-assessment.html";

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function slug(s){ return String(s||"").toLowerCase().trim().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
function bandOf(v){ return v==null?null:v<45?"low":v<70?"medium":"high"; }
function bandColor(v){ if(v==null)return "#e9e9dd"; if(v<45)return "#d6483c"; if(v<55)return "#e0a72e"; if(v<70)return "#cdd64a"; return "#5f8a00"; }
function fmtPc(v){ return v==null?"\u2013":Math.round(v)+"%"; }

// ---------- campaign store (local; mirrors a tab in the existing Google Sheet) ----------
const CKEY="innopulse360_campaigns";
function loadCampaigns(){ try{return JSON.parse(localStorage.getItem(CKEY)||"[]");}catch(e){return [];} }
function saveCampaigns(a){ localStorage.setItem(CKEY,JSON.stringify(a)); }
function getCampaign(id){ return loadCampaigns().find(c=>c.id===id); }
function upsertCampaign(c){ const a=loadCampaigns();const i=a.findIndex(x=>x.id===c.id);if(i>=0)a[i]=c;else a.push(c);saveCampaigns(a); }

// ---------- responses ----------
// In production these come from the Apps Script web app reading the corporate Sheet tab.
// Locally we read pending responses captured by the assessment page.
function localResponses(){ try{return JSON.parse(localStorage.getItem("innopulse360_pending")||"[]");}catch(e){return [];} }
function fetchResponses(campaignId){
    /* === SUPABASE_READ_PATH (Phase 3 read migration) — reversible: delete this wrapper to restore Apps-Script-only reads === */
    try{
      var __sb = window.__sbClient;
      if(__sb && typeof __sb.from === 'function'){
        return __sb.from('responses').select('*').eq('campaign_id', campaignId)
          .then(function(res){
            if(res && res.error){ throw res.error; }
            var rows = (res && res.data) || [];
            var mapped = rows.map(function(x){
              return {
                recordId: x.record_id,
                campaign: x.campaign_id,
                campaignCode: x.campaign_code,
                company: x.company,
                stakeholder: x.stakeholder_group,
                stakeholderLabel: x.stakeholder_label,
                respondentName: x.respondent_name,
                departmentRole: x.department_role,
                overallScore: x.overall_score,
                band: x.band,
                pillarScores: x.pillar_scores,
                indicators: x.indicators,
                comments: x.comments,
                profile: x.profile,
                sentAt: x.submitted_at
              };
            });
            var local = localResponses().filter(function(r){ return r.campaign === campaignId; });
            var seen = {}; mapped.forEach(function(r){ if(r.recordId) seen[r.recordId]=1; });
            return mapped.concat(local.filter(function(r){ return !r.recordId || !seen[r.recordId]; }));
          })
          .catch(function(err){
            console.warn('[dashboard] Supabase read failed, using Apps Script fallback:', err && err.message);
            return fetchResponsesLegacy(campaignId);
          });
      }
    }catch(e){ /* fall through to legacy */ }
    return fetchResponsesLegacy(campaignId);
  }
  function fetchResponsesLegacy(campaignId){
  return new Promise(resolve=>{
    const local=localResponses().filter(r=>!campaignId||r.campaign===campaignId);
    if(!ENDPOINT){ resolve(local); return; }
    fetch(ENDPOINT+(ENDPOINT.includes("?")?"&":"?")+"mode=read360&campaign="+encodeURIComponent(campaignId))
      .then(r=>r.json()).then(d=>resolve((d&&d.records)?d.records.concat(local):local))
      .catch(()=>resolve(local));
  });
}

// ---------- aggregation ----------
function aggregate(responses, activeGroups, weights){
  const byGroup={}; activeGroups.forEach(g=>byGroup[g]={n:0,pillars:{}});
  PILLARS.forEach(p=>activeGroups.forEach(g=>byGroup[g].pillars[p.id]={sum:0,n:0}));
  responses.forEach(r=>{
    const g=r.stakeholder; if(!byGroup[g])return; byGroup[g].n++;
    PILLARS.forEach(p=>{ const v=r.pillarScores&&r.pillarScores[p.id]; if(v!=null){byGroup[g].pillars[p.id].sum+=v;byGroup[g].pillars[p.id].n++;} });
  });
  const groupPillar={}; // group -> pillarId -> avg
  activeGroups.forEach(g=>{ groupPillar[g]={}; PILLARS.forEach(p=>{const c=byGroup[g].pillars[p.id];groupPillar[g][p.id]=c.n?Math.round(c.sum/c.n):null;}); });
  // pillar overall (weighted across groups by stakeholder weight, only groups w/ data)
  const pillarOverall={};
  PILLARS.forEach(p=>{
    let wsum=0,acc=0;
    activeGroups.forEach(g=>{ const v=groupPillar[g][p.id]; if(v!=null){const w=weights[g]||0; acc+=v*w; wsum+=w;} });
    pillarOverall[p.id]=wsum?Math.round(acc/wsum):null;
  });
  // organisation overall = pillar-weighted of pillarOverall
  let owsum=0,oacc=0; PILLARS.forEach(p=>{ const v=pillarOverall[p.id]; if(v!=null){oacc+=v*p.weight;owsum+=p.weight;} });
  const overall= owsum?Math.round(oacc/owsum):null;
  // group overall
  const groupOverall={}; activeGroups.forEach(g=>{ let ws=0,ac=0;PILLARS.forEach(p=>{const v=groupPillar[g][p.id];if(v!=null){ac+=v*p.weight;ws+=p.weight;}});groupOverall[g]=ws?Math.round(ac/ws):null; });
  return {byGroup,groupPillar,pillarOverall,overall,groupOverall,total:responses.length};
}
window.__dashJsP1=true;


// ---------- app state ----------
const A={ campaign:null, responses:[], agg:null, tab:"overview" };
const root=()=>document.getElementById("view");

function currentGroups(){ return (A.campaign&&A.campaign.groups&&A.campaign.groups.length)?A.campaign.groups:["executive","employee","customer","partner"]; }
function currentWeights(){
  const g=currentGroups(); const w={}; let base={}; g.forEach(k=>base[k]=DEFAULT_WEIGHTS[k]||0);
  let s=Object.values(base).reduce((a,b)=>a+b,0); if(s<=0){ g.forEach(k=>base[k]=1/g.length); s=1; }
  g.forEach(k=>w[k]=base[k]/s); return w;
}

function recompute(){ A.agg = aggregate(A.responses, currentGroups(), currentWeights()); }

function linkFor(group){
  const base=location.href.replace(/[^/]*$/,"")+ASSESS_PATH;
  const c=A.campaign;
  return base+"?company="+encodeURIComponent(c?c.company:"")+"&campaign="+encodeURIComponent(c?c.id:"")+"&stakeholder="+group;
}

// ---------- top chrome ----------
function renderShell(){
  const tabs=[["overview","Executive Summary"],["comparison","Stakeholder Comparison"],["heatmap","Pillar Heatmap"],["responses","Responses"],["campaign","Campaign & Links"]];
  document.getElementById("tabbar").innerHTML = tabs.map(([k,l])=>`<button data-tab="${k}" aria-selected="${A.tab===k}">${l}</button>`).join("");
  document.querySelectorAll("#tabbar button").forEach(b=>b.onclick=()=>{A.tab=b.dataset.tab;draw();});
  const sel=document.getElementById("campaignSel");
  const cs=loadCampaigns();
  sel.innerHTML='<option value="">Select campaign\u2026</option>'+cs.map(c=>`<option value="${c.id}" ${A.campaign&&A.campaign.id===c.id?"selected":""}>${esc(c.company)} \u2014 ${esc(c.name)}</option>`).join("")+'<option value="__new">+ New campaign\u2026</option>';
  sel.onchange=async()=>{ if(sel.value==="__new"){A.campaign=null;A.tab="campaign";draw();return;} A.campaign=getCampaign(sel.value)||null; if(A.campaign){A.responses=await fetchResponses(A.campaign.id);recompute();} A.tab=A.campaign?"overview":"campaign"; draw(); };
}

function draw(){
  renderShell();
  if(A.tab!=="campaign" && !A.campaign){ root().innerHTML='<div class="card"><h1>No campaign selected</h1><p class="muted">Choose a campaign above, or create one in <b>Campaign &amp; Links</b> to generate stakeholder assessment links and view results.</p></div>'; return; }
  ({overview:viewOverview,comparison:viewComparison,heatmap:viewHeatmap,responses:viewResponses,campaign:viewCampaign}[A.tab]||viewOverview)();
}

// ---------- Executive Summary ----------
function viewOverview(){
  const a=A.agg, g=currentGroups();
  const respondTarget=A.campaign.targets||{};
  const kpis=`<div class="grid g4">
    <div class="kpi"><div class="v">${fmtPc(a.overall)}</div><div class="l">Organisation score</div></div>
    <div class="kpi"><div class="v">${a.total}</div><div class="l">Total responses</div></div>
    <div class="kpi"><div class="v">${g.length}</div><div class="l">Stakeholder groups</div></div>
    <div class="kpi"><div class="v">${esc(A.campaign.status||"Open")}</div><div class="l">Campaign status</div></div>
  </div>`;
  // pillar bars
  const bars=PILLARS.map(p=>{const v=a.pillarOverall[p.id];return `<div style="margin:12px 0"><div class="row spread" style="margin-bottom:5px"><span style="font-weight:600;font-size:14px">${esc(p.name)}</span><span style="font-weight:700">${fmtPc(v)}</span></div><div class="bar" style="height:11px"><i style="width:${v||0}%;background:${bandColor(v)}"></i></div></div>`;}).join("");
  // strongest / weakest
  const ranked=PILLARS.map(p=>({p,v:a.pillarOverall[p.id]})).filter(x=>x.v!=null).sort((x,y)=>y.v-x.v);
  const strong=ranked[0], weak=ranked[ranked.length-1];
  let insight="";
  if(strong&&weak&&ranked.length){ insight=`<div class="notice card" style="background:var(--cream2)"><h3>Where to focus</h3><p style="font-size:14px"><b>Strongest pillar:</b> ${esc(strong.p.name)} (${fmtPc(strong.v)}). <b>Biggest gap:</b> ${esc(weak.p.name)} (${fmtPc(weak.v)}) \u2014 associated barrier: <b>${esc(weak.p.barrier||"")}</b>. ${esc((weak.p.bands&&weak.p.bands.low&&weak.p.bands.low.text)||"")}</p></div>`; }
  // response coverage by group
  const cov=g.map(grp=>{const n=a.byGroup[grp]?a.byGroup[grp].n:0;const t=respondTarget[grp]||0;const pct=t?Math.min(100,Math.round(n/t*100)):0;return `<div class="row spread" style="margin:7px 0"><span style="width:200px;font-size:13px;font-weight:600">${esc(STAKEHOLDERS[grp]?STAKEHOLDERS[grp].label:grp)}</span><div class="bar" style="flex:1"><i style="width:${t?pct:(n?100:0)}%;background:var(--lime2)"></i></div><span class="num" style="width:90px">${n}${t?(" / "+t):""}</span></div>`;}).join("");
  root().innerHTML = `<div class="row spread" style="margin-bottom:14px"><div><div class="eyebrow">InnoPulse Full-Scale</div><h1>${esc(A.campaign.company)} \u2014 ${esc(A.campaign.name)}</h1></div><button class="btn btn-ghost" id="exportBtn">Export CSV</button></div>
  ${kpis}
  <div class="grid g2" style="margin-top:20px"><div class="card"><h2>Pillar scores (organisation)</h2>${bars}</div><div><div class="card"><h2>Response coverage</h2>${cov||'<p class="muted">No responses yet.</p>'}</div>${insight}</div></div>`;
  document.getElementById("exportBtn").onclick=exportCSV;
}
window.__dashJsP2=true;


// ---------- Stakeholder Comparison ----------
function viewComparison(){
  const a=A.agg,g=currentGroups();
  const head="<tr><th>Pillar</th>"+g.map(grp=>`<th class="num">${esc(STAKEHOLDERS[grp]?STAKEHOLDERS[grp].label:grp)}</th>`).join("")+'<th class="num">Org</th><th class="num">Spread</th></tr>';
  const rows=PILLARS.map(p=>{
    const vals=g.map(grp=>a.groupPillar[grp][p.id]);
    const present=vals.filter(v=>v!=null);
    const spread=present.length?Math.max(...present)-Math.min(...present):null;
    return "<tr><td style='font-weight:600'>"+esc(p.name)+"</td>"+vals.map(v=>`<td class="num" style="color:${v==null?'#bbb':bandColor(v)};font-weight:700">${fmtPc(v)}</td>`).join("")+`<td class="num" style="font-weight:800">${fmtPc(a.pillarOverall[p.id])}</td><td class="num">${spread==null?"\u2013":spread+" pts"}</td></tr>`;
  }).join("");
  const foot="<tr><td style='font-weight:800'>Overall</td>"+g.map(grp=>`<td class="num" style="font-weight:800">${fmtPc(a.groupOverall[grp])}</td>`).join("")+`<td class="num" style="font-weight:800">${fmtPc(a.overall)}</td><td></td></tr>`;
  const ncount="<tr><td class='muted'>Responses</td>"+g.map(grp=>`<td class="num muted">${a.byGroup[grp]?a.byGroup[grp].n:0}</td>`).join("")+`<td class="num muted">${a.total}</td><td></td></tr>`;
  // gap callouts: largest divergence pillar
  let gapNote="";
  let maxSpread=-1,maxP=null;
  PILLARS.forEach(p=>{const vals=g.map(grp=>a.groupPillar[grp][p.id]).filter(v=>v!=null);if(vals.length>1){const s=Math.max(...vals)-Math.min(...vals);if(s>maxSpread){maxSpread=s;maxP=p;}}});
  if(maxP&&maxSpread>=0){ gapNote=`<div class="card" style="background:var(--cream2)"><h3>Largest perception gap</h3><p style="font-size:14px"><b>${esc(maxP.name)}</b> shows the widest divergence between stakeholder groups (${maxSpread} points). Gaps like this often signal that leadership and front-line views of innovation are misaligned \u2014 worth probing in the executive debrief.</p></div>`; }
  root().innerHTML=`<h1>Stakeholder Comparison</h1><p class="muted" style="margin-bottom:16px">How each stakeholder group scores every pillar, with the weighted organisation roll-up and the spread between groups.</p><div class="card"><table>${head}${rows}${foot}${ncount}</table></div>${gapNote}`;
}

// ---------- Heatmap ----------
function viewHeatmap(){
  const a=A.agg,g=currentGroups();
  const head="<tr><th>Stakeholder group</th>"+PILLARS.map(p=>`<th class="num" title="${esc(p.name)}">${esc(p.short)}</th>`).join("")+'<th class="num">Overall</th></tr>';
  const rows=g.map(grp=>{
    const cells=PILLARS.map(p=>{const v=a.groupPillar[grp][p.id];return `<td class="cell" style="background:${bandColor(v)}">${fmtPc(v)}</td>`;}).join("");
    return `<tr><td style="font-weight:600">${esc(STAKEHOLDERS[grp]?STAKEHOLDERS[grp].label:grp)} <span class="muted">(${a.byGroup[grp]?a.byGroup[grp].n:0})</span></td>${cells}<td class="cell" style="background:${bandColor(a.groupOverall[grp])}">${fmtPc(a.groupOverall[grp])}</td></tr>`;
  }).join("");
  const orgRow="<tr><td style='font-weight:800'>Organisation</td>"+PILLARS.map(p=>`<td class="cell" style="background:${bandColor(a.pillarOverall[p.id])}">${fmtPc(a.pillarOverall[p.id])}</td>`).join("")+`<td class="cell" style="background:${bandColor(a.overall)}">${fmtPc(a.overall)}</td></tr>`;
  const legend=`<div class="legend"><span><i style="background:#d6483c"></i>Low (&lt;45)</span><span><i style="background:#e0a72e"></i>Developing (45\u201354)</span><span><i style="background:#cdd64a"></i>Moderate (55\u201369)</span><span><i style="background:#5f8a00"></i>Strong (70+)</span><span><i style="background:#e9e9dd"></i>No data</span></div>`;
  root().innerHTML=`<h1>Pillar Heatmap</h1><p class="muted" style="margin-bottom:16px">Stakeholder groups against the five innovation pillars. Darker green is stronger; red marks priority gaps.</p><div class="card heat"><table>${head}${rows}${orgRow}</table>${legend}</div>`;
}

// ---------- Responses tracker ----------
function viewResponses(){
  const rs=A.responses.slice().sort((a,b)=>(b.sentAt||"").localeCompare(a.sentAt||""));
  const rows=rs.map(r=>{
    const ov=r.overallScore;
    return `<tr><td>${esc((r.sentAt||"").slice(0,10))}</td><td>${esc(STAKEHOLDERS[r.stakeholder]?STAKEHOLDERS[r.stakeholder].label:r.stakeholder)}</td><td>${esc((r.profile&&r.profile.name)||"Anonymous")}</td><td>${esc((r.profile&&r.profile.dept)||"\u2013")}</td><td class="num" style="font-weight:700;color:${bandColor(ov)}">${fmtPc(ov)}</td></tr>`;
  }).join("");
  root().innerHTML=`<div class="row spread" style="margin-bottom:14px"><h1>Responses (${rs.length})</h1><button class="btn btn-ghost" id="exportBtn2">Export CSV</button></div><div class="card"><table><tr><th>Date</th><th>Group</th><th>Name</th><th>Dept / role</th><th class="num">Overall</th></tr>${rows||'<tr><td colspan="5" class="muted">No responses captured yet for this campaign.</td></tr>'}</table></div><p class="muted">Named responses appear only if the campaign was set to named mode; otherwise respondents are aggregated anonymously.</p>`;
  document.getElementById("exportBtn2").onclick=exportCSV;
}

// ---------- Campaign & Links ----------
function viewCampaign(){
  const editing=!!A.campaign; const c=A.campaign||{company:"",name:"",id:"",groups:["executive","employee","customer","partner"],status:"Open",named:false,targets:{}};
  const allGroups=Object.keys(STAKEHOLDERS);
  const chips=allGroups.map(k=>`<span class="chip" data-g="${k}" aria-pressed="${c.groups.includes(k)}">${esc(STAKEHOLDERS[k].label)}</span>`).join("");
  let linksBlock="";
  if(editing){
    linksBlock=`<div class="card"><h2>Stakeholder assessment links</h2><p class="muted" style="margin-bottom:12px">Send each group its own link. Each captures responses tagged to this campaign and stakeholder group.</p>`+
      c.groups.map(g=>`<div style="margin:12px 0"><div style="font-weight:700;font-size:13px;margin-bottom:5px">${esc(STAKEHOLDERS[g].label)}</div><div class="row" style="gap:8px"><div class="linkbox" style="flex:1" id="lk_${g}">${esc(linkFor(g))}</div><button class="btn btn-ghost" data-copy="${g}">Copy</button></div></div>`).join("")+`</div>`;
  }
  root().innerHTML=`<h1>${editing?"Manage campaign":"Create a campaign"}</h1><p class="muted" style="margin-bottom:16px">A campaign represents one organisation's InnoPulse Full-Scale assessment cycle. Responses are stored per company, campaign and stakeholder group.</p>
  <div class="card"><div class="grid g2"><div class="field"><label>Company / organisation</label><input id="c_company" value="${esc(c.company)}" placeholder="e.g. Acme Industries"></div><div class="field"><label>Campaign name</label><input id="c_name" value="${esc(c.name)}" placeholder="e.g. 2026 Innovation Review"></div></div>
  <div class="field"><label>Campaign ID (used in links)</label><input id="c_id" value="${esc(c.id)}" placeholder="auto-generated from company + name" ${editing?"readonly":""}></div>
  <div class="field"><label>Stakeholder groups</label><div class="chips" id="grpChips">${chips}</div></div>
  <div class="grid g2"><div class="field"><label>Response mode</label><select id="c_named"><option value="false" ${!c.named?"selected":""}>Anonymous (aggregated only)</option><option value="true" ${c.named?"selected":""}>Named responses</option></select></div><div class="field"><label>Status</label><select id="c_status"><option ${c.status==="Open"?"selected":""}>Open</option><option ${c.status==="Closed"?"selected":""}>Closed</option></select></div></div>
  <div class="row" style="margin-top:8px;gap:10px"><button class="btn btn-primary" id="saveCamp">${editing?"Save changes":"Create campaign & generate links"}</button>${editing?'<button class="btn btn-ghost" id="refreshData">Refresh results</button>':""}</div></div>
  ${linksBlock}`;
  // chip toggles
  document.querySelectorAll("#grpChips .chip").forEach(ch=>ch.onclick=()=>{const on=ch.getAttribute("aria-pressed")==="true";ch.setAttribute("aria-pressed",!on);});
  // auto id
  const idEl=document.getElementById("c_id");
  function autoId(){ if(editing)return; idEl.value=slug(document.getElementById("c_company").value)+"-"+slug(document.getElementById("c_name").value); }
  if(!editing){ document.getElementById("c_company").oninput=autoId; document.getElementById("c_name").oninput=autoId; }
  document.getElementById("saveCamp").onclick=()=>{
    const groups=[...document.querySelectorAll("#grpChips .chip")].filter(x=>x.getAttribute("aria-pressed")==="true").map(x=>x.dataset.g);
    const company=document.getElementById("c_company").value.trim();
    const name=document.getElementById("c_name").value.trim();
    let id=idEl.value.trim()||slug(company)+"-"+slug(name);
    if(!company||!name||!groups.length){ alert("Please enter a company, campaign name, and at least one stakeholder group."); return; }
    const camp={id,company,name,groups,named:document.getElementById("c_named").value==="true",status:document.getElementById("c_status").value,targets:c.targets||{},created:c.created||new Date().toISOString()};
    upsertCampaign(camp); A.campaign=camp;
    fetchResponses(camp.id).then(r=>{A.responses=r;recompute();A.tab="overview";draw();});
  };
  const rd=document.getElementById("refreshData"); if(rd)rd.onclick=()=>fetchResponses(A.campaign.id).then(r=>{A.responses=r;recompute();draw();});
  document.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>{const g=b.dataset.copy;const txt=document.getElementById("lk_"+g).textContent;navigator.clipboard&&navigator.clipboard.writeText(txt);b.textContent="Copied";setTimeout(()=>b.textContent="Copy",1500);});
}

// ---------- CSV export ----------
function exportCSV(){
  const rs=A.responses; const cols=["recordId","sentAt","company","campaign","stakeholder","stakeholderLabel","name","dept","overallScore","band"];
  PILLARS.forEach(p=>cols.push("pillar_"+p.id));
  PILLARS.forEach(p=>p.questions.forEach((_,qi)=>cols.push(p.id+"_q"+(qi+1))));
  PILLARS.forEach(p=>cols.push("comment_"+p.id));
  const esc2=v=>{v=v==null?"":String(v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const lines=[cols.join(",")];
  rs.forEach(r=>{
    const row=[r.recordId,r.sentAt,r.company,r.campaign,r.stakeholder,r.stakeholderLabel,(r.profile&&r.profile.name)||"",(r.profile&&r.profile.dept)||"",r.overallScore,r.band];
    PILLARS.forEach(p=>row.push(r.pillarScores?r.pillarScores[p.id]:""));
    PILLARS.forEach(p=>p.questions.forEach((_,qi)=>row.push(r.indicators?r.indicators[p.id+"_q"+(qi+1)]:"")));
    PILLARS.forEach(p=>row.push(r.comments?r.comments[p.id]:""));
    lines.push(row.map(esc2).join(","));
  });
  const blob=new Blob([lines.join("\n")],{type:"text/csv"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="innopulse360_"+((A.campaign&&A.campaign.id)||"export")+".csv"; a.click(); URL.revokeObjectURL(url);
}

// ---------- boot ----------
function boot(){
  if(!window.INNOPULSE_PILLARS){ document.getElementById("view").innerHTML='<div class="card"><h1>Could not load dashboard</h1><p class="muted">pillars.js did not load. Make sure it sits next to this file.</p></div>'; return; }
  draw();
}
document.addEventListener("DOMContentLoaded",boot);

</script>
